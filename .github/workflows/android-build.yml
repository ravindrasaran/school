name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Ensure Gradle Wrapper exists & Grant execute permission
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    # --- यहाँ बिना किसी Secrets के Dummy फ़ाइलें और Keystore ऑटोमैटिक जनरेट होंगे ---
    - name: Generate Dummy Google Services and Debug Keystore
      run: |
        # 1. एक नकली google-services.json फाइल बनाना ताकि बिल्ड न रुके
        echo '{"project_info":{"project_number":"12345","project_id":"dummy-id"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.example.school"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json
        
        # 2. एक डिफ़ॉल्ट debug.keystore खुद जनरेट करना ताकि validateSigningDebug पास हो जाए
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: school-timetable-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk